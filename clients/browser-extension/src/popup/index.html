<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>AMPass</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="url(#g)"/><path d="M16 8L10 12v4c0 4.4 2.6 8.5 6 10 3.4-1.5 6-5.6 6-10v-4l-6-4z" fill="white" opacity="0.9"/><defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
        <span class="brand-name">AMPass</span>
      </div>
      <div class="header-actions">
        <button id="btnSettings" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15 1.65 1.65 0 003.17 14H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68 1.65 1.65 0 0010 3.17V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <button id="btnLock" class="icon-btn" title="Lock vault" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </button>
      </div>
    </header>

    <!-- Status Bar -->
    <div id="statusBar" class="status-bar" style="display:none;"></div>
    <div id="bridgeIndicator" class="bridge-indicator" style="display:none;" title="Connected to AMPass Desktop">🖥️</div>

    <!-- Views -->
    <div id="viewSetup" class="view" style="display:none;">
      <div class="view-center">
        <p class="text-muted">Connect to your AMPass server</p>
        <input type="url" id="setupUrl" class="input" placeholder="https://yourdomain.com/ampass">
        <button id="btnSetupSave" class="btn btn-primary btn-full">Connect</button>
      </div>
    </div>

    <div id="viewLogin" class="view" style="display:none;">
      <div class="view-center">
        <p class="text-muted">Sign in to your vault</p>
        <input type="text" id="loginUsername" class="input" placeholder="Username or email" autocomplete="username">
        <input type="password" id="loginPassword" class="input" placeholder="Password" autocomplete="current-password">
        <button id="btnLogin" class="btn btn-primary btn-full">Sign In</button>
        <div id="loginError" class="error-msg" style="display:none;"></div>
      </div>
    </div>

    <div id="viewUnlock" class="view" style="display:none;">
      <div class="view-center">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.5" style="margin:0 auto 12px;display:block;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <p class="text-muted">Enter master password to unlock</p>
        <input type="password" id="unlockPassword" class="input" placeholder="Master password" autocomplete="off">
        <button id="btnUnlock" class="btn btn-primary btn-full">Unlock</button>
        <div id="unlockError" class="error-msg" style="display:none;"></div>
      </div>
    </div>

    <div id="viewVault" class="view" style="display:none;">
      <!-- Search -->
      <div class="search-bar">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="input search-input" placeholder="Search vault...">
      </div>

      <!-- Matches for current site -->
      <div id="matchesSection" style="display:none;">
        <div class="section-header">
          <span class="section-title">Matches for this site</span>
        </div>
        <div id="matchesList" class="item-list"></div>
      </div>

      <!-- All items -->
      <div id="allItemsSection">
        <div class="section-header">
          <span class="section-title">All Items</span>
          <span id="itemCount" class="badge">0</span>
        </div>
        <div id="allItemsList" class="item-list"></div>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" style="display:none;">
        <p>No items in your vault yet.</p>
      </div>

      <!-- Actions -->
      <div class="bottom-actions">
        <button id="btnAddNew" class="btn btn-secondary btn-sm">+ Add Login</button>
        <button id="btnGenerate" class="btn btn-secondary btn-sm">Generate</button>
      </div>
    </div>

    <!-- Generator Panel -->
    <div id="viewGenerator" class="view" style="display:none;">
      <div class="section-header">
        <button id="btnBackFromGen" class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <span class="section-title">Password Generator</span>
      </div>
      <div class="gen-output">
        <input type="text" id="genPassword" class="input mono" readonly>
        <button id="btnCopyGen" class="icon-btn" title="Copy"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
      </div>
      <div id="genStrength" class="strength-bar"><div class="strength-fill"></div></div>
      <div class="gen-options">
        <label class="slider-label">Length: <span id="genLengthVal">20</span></label>
        <input type="range" id="genLength" min="8" max="64" value="20" class="range">
        <label class="check-label"><input type="checkbox" id="genUpper" checked> Uppercase</label>
        <label class="check-label"><input type="checkbox" id="genLower" checked> Lowercase</label>
        <label class="check-label"><input type="checkbox" id="genNumbers" checked> Numbers</label>
        <label class="check-label"><input type="checkbox" id="genSymbols" checked> Symbols</label>
      </div>
      <button id="btnRegenerate" class="btn btn-primary btn-full">Regenerate</button>
    </div>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="../shared/security.js"></script>
  <script src="../shared/domain-utils.js"></script>
  <script src="../shared/crypto-client.js"></script>
  <script src="../shared/password-generator.js"></script>
  <script src="../shared/native-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
